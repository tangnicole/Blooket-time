
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pack Opening</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    text-align: center;
  }
  h1 {
    margin-bottom: 10px;
  }
  #scoreDisplay {
    font-weight: bold;
    margin-bottom: 30px;
    font-size: 20px;
    color: #4a90e2;
  }
  #packButton {
    padding: 12px 28px;
    font-size: 18px;
    cursor: pointer;
    background-color: #4a90e2;
    border: none;
    color: white;
    border-radius: 6px;
    margin-bottom: 30px;
  }
  #packButton:hover {
    background-color: #357ABD;
  }
  #results {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
  }
  .blook {
    width: 100px;
    border-radius: 8px;
    padding: 10px;
    color: white;
    font-weight: bold;
    cursor: default;
    box-shadow: 0 0 8px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
  }
  .blook img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    margin-bottom: 8px;
  }
  .blook:hover {
    transform: scale(1.1);
  }

  /* Rarity colors */
  .uncommon {
    background-color: #27ae60;
    box-shadow: 0 0 10px #2ecc71;
  }
  .rare {
    background-color: #2980b9;
    box-shadow: 0 0 15px #3498db;
  }
  .epic {
    background-color: #8e44ad;
    box-shadow: 0 0 15px #9b59b6;
  }
  .legendary {
    background-color: #f39c12;
    box-shadow: 0 0 20px #f1c40f;
  }
  .unique {
    background-color: #e67e22;
    box-shadow: 0 0 18px #d35400;
  }
  .chroma {
    background: linear-gradient(45deg, #f39c12, #e74c3c, #8e44ad, #3498db);
    box-shadow: 0 0 20px #f39c12;
  }
  .mythical {
    background-color: #c0392b;
    box-shadow: 0 0 22px #e74c3c;
  }

  /* Simple pack opening animation */
  .opening {
    animation: pulse 0.6s ease infinite alternate;
  }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
  }

  #backHomeBtn {
    margin-top: 30px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background-color: #4a90e2;
    color: white;
  }
  #backHomeBtn:hover {
    background-color: #357ABD;
  }
</style>
</head>
<body>

<h1>Pack Opening</h1>
<div id="scoreDisplay">Your Blook Score: 0</div>
<button id="packButton">Open Pack</button>

<div id="results"></div>

<button id="backHomeBtn">Back to Home</button>

<script>
  // Blook data: name, rarity, image URL
  const blooks = [
    {name: "Blaze", rarity: "uncommon", img: "https://i.imgur.com/HXrrM7u.png"},
    {name: "Frost", rarity: "uncommon", img: "https://i.imgur.com/6rSxN6I.png"},
    {name: "Spark", rarity: "rare", img: "https://i.imgur.com/9KbY9a5.png"},
    {name: "Shadow", rarity: "rare", img: "https://i.imgur.com/jJY7TzG.png"},
    {name: "Phoenix", rarity: "epic", img: "https://i.imgur.com/SbU0OaW.png"},
    {name: "Dragon", rarity: "epic", img: "https://i.imgur.com/5hTvyjP.png"},
    {name: "Golden Knight", rarity: "legendary", img: "https://i.imgur.com/fJ6zF3v.png"},
    {name: "Mystic Queen", rarity: "legendary", img: "https://i.imgur.com/GdP6v3a.png"},
    {name: "Celestial", rarity: "unique", img: "https://i.imgur.com/9kFvG8V.png"},
    {name: "Phantom", rarity: "unique", img: "https://i.imgur.com/PAmRs7c.png"},
    {name: "Prism", rarity: "chroma", img: "https://i.imgur.com/1KX1G8X.png"},
    {name: "Nebula", rarity: "chroma", img: "https://i.imgur.com/93XxP5P.png"},
    {name: "Inferno", rarity: "mythical", img: "https://i.imgur.com/zX1v8C0.png"},
    {name: "Eclipse", rarity: "mythical", img: "https://i.imgur.com/Mr5Qk8M.png"}
  ];

  // Rarity weights you provided (relative)
  const rarityWeights = {
    uncommon: 100,
    rare: 10.4,
    epic: 3.4,
    legendary: 0.5,
    unique: 0.010,
    chroma: 0.03,
    mythical: 0.006
  };

  // Normalize weights to sum 1
  const totalWeight = Object.values(rarityWeights).reduce((a,b) => a + b, 0);

  function getRandomRarity() {
    const rand = Math.random() * totalWeight;
    let sum = 0;
    for (const [rarity, weight] of Object.entries(rarityWeights)) {
      sum += weight;
      if (rand <= sum) return rarity;
    }
    // fallback
    return 'uncommon';
  }

  function getRandomBlook() {
    const rarity = getRandomRarity();
    const filtered = blooks.filter(b => b.rarity === rarity);
    if (filtered.length === 0) {
      // fallback to uncommon if no blooks found for rarity
      return blooks.find(b => b.rarity === 'uncommon');
    }
    const index = Math.floor(Math.random() * filtered.length);
    return filtered[index];
  }

  const resultsDiv = document.getElementById('results');
  const packButton = document.getElementById('packButton');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const backHomeBtn = document.getElementById('backHomeBtn');

  let score = parseInt(localStorage.getItem('blookScore')) || 0;
  scoreDisplay.textContent = `Your Blook Score: ${score}`;

  packButton.addEventListener('click', () => {
    packButton.disabled = true;
    resultsDiv.innerHTML = '';
    resultsDiv.classList.add('opening');

    setTimeout(() => {
      resultsDiv.classList.remove('opening');
      const packSize = 5;
      for(let i=0; i<packSize; i++) {
        const blook = getRandomBlook();
        const blookDiv = document.createElement('div');
        blookDiv.className = `blook ${blook.rarity}`;
        blookDiv.title = `${blook.name} (${blook.rarity.charAt(0).toUpperCase() + blook.rarity.slice(1)})`;

        const img = document.createElement('img');
        img.src = blook.img;
        img.alt = blook.name;
        blookDiv.appendChild(img);

        const nameDiv = document.createElement('div');
        nameDiv.textContent = blook.name;
        blookDiv.appendChild(nameDiv);

        resultsDiv.appendChild(blookDiv);
      }
      score += 50;
      localStorage.setItem('blookScore', score);
      scoreDisplay.textContent = `Your Blook Score: ${score}`;
      packButton.disabled = false;
    }, 800);
  });

  backHomeBtn.addEventListener('click', () => {
    window.location.href = 'index.html';
  });
</script>

</body>
</html>
